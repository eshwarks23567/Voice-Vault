# Voice Inventory System - Docker Compose
# Production deployment configuration

version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-inventory-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./audio_files:/app/audio_files
      - ./failures:/app/failures
    environment:
      - DATABASE_PATH=/app/data/inventory.db
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.85}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # Redis cache (optional, for scaling)
  redis:
    image: redis:7-alpine
    container_name: voice-inventory-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: voice-inventory-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: voice-inventory-network
